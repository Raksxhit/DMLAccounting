<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DML Accounting Tracker</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root {
            --bg-color: #f1f5f9;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-light: #64748b;
            --border-color: #cbd5e1;
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --danger: #ef4444;
            --danger-hover: #dc2626;
            --success: #10b981;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --radius: 12px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 20px;
            padding-bottom: 100px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            background: var(--card-bg);
            padding: 20px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            flex-wrap: wrap;
            gap: 15px;
        }

        /* 1. All device friendly title line rule */
        header h1 {
            font-size: clamp(1.3rem, 4vw, 2.2rem);
            font-weight: 700;
            color: var(--primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1 1 auto;
            min-width: 250px;
        }

        .header-controls {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        button {
            padding: 10px 18px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            white-space: nowrap;
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-hover); }
        .btn-danger { background: var(--danger); color: white; }
        .btn-danger:hover { background: var(--danger-hover); }
        .btn-secondary { background: var(--border-color); color: var(--text-main); }
        .btn-secondary:hover { background: #b4c6ef; }

        /* Login Screen Overlay & Shake Animation Setup */
        #login-overlay {
            position: fixed;
            top:0; left:0; width:100%; height:100%;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.3s ease;
        }

        .login-box {
            background: var(--card-bg);
            padding: 40px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 400px;
            text-align: center;
            border: 2px solid transparent;
            transition: border-color 0.2s;
        }

        .login-box h2 { margin-bottom: 20px; color: var(--primary); }
        
        .login-box input[type="password"] {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        /* 2. Unified 0.7s password error and vibration animation configuration */
        @keyframes vibrate-red {
            0% { transform: translate(0, 0); border-color: var(--danger); box-shadow: 0 0 10px rgba(239, 68, 68, 0.5); }
            15% { transform: translate(-6px, 0); border-color: var(--danger); }
            30% { transform: translate(6px, 0); border-color: var(--danger); }
            45% { transform: translate(-6px, 0); border-color: var(--danger); }
            60% { transform: translate(6px, 0); border-color: var(--danger); }
            75% { transform: translate(-4px, 0); border-color: var(--danger); }
            90% { transform: translate(4px, 0); border-color: var(--danger); }
            100% { transform: translate(0, 0); border-color: var(--danger); box-shadow: 0 0 10px rgba(239, 68, 68, 0.5); }
        }

        .auth-error-animate {
            animation: vibrate-red 0.7s ease-in-out !important;
            border-color: var(--danger) !important;
        }

        /* Broker Sections */
        .broker-container {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 24px;
            margin-bottom: 25px;
            box-shadow: var(--shadow);
        }

        .broker-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--bg-color);
            padding-bottom: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .broker-title { font-size: 18px; font-weight: 700; color: var(--text-main); }

        /* Client Cards and Layout Layout Rules */
        .clients-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }

        @media (max-width: 480px) {
            .clients-grid { grid-template-columns: 1fr; }
            body { padding: 10px; }
            header { padding: 15px; }
        }

        .client-card {
            background: var(--bg-color);
            border-radius: 10px;
            padding: 16px;
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .client-name { font-size: 16px; font-weight: 600; color: var(--primary); }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-group label { font-size: 12px; font-weight: 600; color: var(--text-light); }
        
        .input-row {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        input[type="text"], input[type="number"], select, textarea {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 14px;
            background: #fff;
        }

        /* 4. Remarks Prepend Container Layout */
        .remarks-container {
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin-top: 4px;
        }
        .remarks-label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-light);
        }

        /* Date Custom Sync Fields */
        .date-sync-container {
            position: relative;
            display: flex;
            align-items: center;
            width: 100%;
        }

        .date-sync-container input[type="text"] {
            padding-right: 36px;
            width: 100%;
        }

        .picker-wrapper {
            position: absolute;
            right: 8px;
            cursor: pointer;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .picker-wrapper input[type="date"] {
            position: absolute;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        /* 6. Precision Optimized FAB configuration rules */
        .fab-wrapper {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 2000;
            display: flex;
            flex-direction: column-reverse;
            align-items: flex-end;
        }

        .fab-main-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 14px rgba(37, 99, 235, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            transition: transform 0.2s ease, background 0.2s;
            z-index: 2001;
        }

        .fab-main-btn:hover { background: var(--primary-hover); transform: scale(1.05); }

        .fab-menu-options {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 15px;
            /* Completely standard hidden profile preventing accidental click overlaps */
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            transform: translateY(10px);
            transition: opacity 0.25s ease, transform 0.25s ease, visibility 0.25s;
        }

        /* Triggers expansion window safely without dead-zones surrounding other DOM features */
        .fab-wrapper:hover .fab-menu-options {
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
            transform: translateY(0);
        }

        .fab-child-btn {
            background: var(--card-bg);
            color: var(--text-main);
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
            padding: 10px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            white-space: nowrap;
            transition: background 0.2s;
        }
        .fab-child-btn:hover { background: #f8fafc; }

        /* Unified Secure Prompt Modal Overlay */
        #secure-prompt-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(4px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
        }
        #secure-prompt-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        .prompt-box {
            background: var(--card-bg);
            padding: 25px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            width: 90%;
            max-width: 350px;
            text-align: center;
            border: 2px solid transparent;
        }
        .prompt-box h3 { margin-bottom: 12px; font-size: 16px; color: var(--text-main); }
        .prompt-box input {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 2px solid var(--border-color);
            border-radius: 6px;
            outline: none;
        }
        .prompt-actions { display: flex; justify-content: flex-end; gap: 10px; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-box" id="login-box-card">
            <h2>DML Accounting Tracker</h2>
            <p style="color: var(--text-light); margin-bottom: 20px; font-size:14px;">Secure Authorization Required</p>
            <input type="password" id="auth-password-field" placeholder="Enter System Password" autocomplete="current-password" />
            <button class="btn-primary" style="width: 100%; justify-content: center;" onclick="manualLoginTrigger()">Unlock Tracker</button>
        </div>
    </div>

    <div id="secure-prompt-overlay">
        <div class="prompt-box" id="secure-prompt-box">
            <h3 id="secure-prompt-title">Confirm Admin Password</h3>
            <input type="password" id="secure-prompt-input" placeholder="Enter password" />
            <div class="prompt-actions">
                <button class="btn-secondary" onclick="closeSecurePrompt()">Cancel</button>
                <button class="btn-danger" id="secure-prompt-confirm-btn">Confirm</button>
            </div>
        </div>
    </div>

    <div class="container">
        <header>
            <h1>DML Accounting Tracker</h1>
            <div class="header-controls">
                <button class="btn-primary" onclick="createNewBroker()">+ Add New Broker</button>
                <button class="btn-danger" onclick="wipeAllSystemData()">Clear All Data</button>
            </div>
        </header>

        <div id="dashboard-brokers-wrapper">
            </div>
    </div>

    <div class="fab-wrapper">
        <div class="fab-main-btn">⚙️</div>
        <div class="fab-menu-options">
            <button class="fab-child-btn" onclick="createNewBroker()">📁 Add New Broker</button>
            <button class="fab-child-btn" onclick="addNewClientDirectly()">👤 Add New Client</button>
            <button class="fab-child-btn" onclick="wipeAllSystemData()">⚠️ Clear All Data</button>
        </div>
    </div>

    <script>
        // Core Web Application Database Credentials Configuration
        const firebaseConfig = {
            databaseURL: "https://dml-tracker-default-rtdb.firebaseio.com/"
        };
        
        // Initialize Core Modules
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Security Configurations
        const CRYPTO_KEY_HASH = "dml123"; 
        let globalDatabaseSnapshot = {};
        let activeSecureCallback = null;

        const passwordField = document.getElementById('auth-password-field');
        const loginBoxCard = document.getElementById('login-box-card');

        // 2. Automated Keypress Listener Monitoring Live Matches
        passwordField.addEventListener('input', function() {
            if (this.value === CRYPTO_KEY_HASH) {
                executeSuccessfulLogin();
            }
        });

        passwordField.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                manualLoginTrigger();
            }
        });

        function manualLoginTrigger() {
            if (passwordField.value === CRYPTO_KEY_HASH) {
                executeSuccessfulLogin();
            } else {
                triggerErrorVibrationAnimation(loginBoxCard);
                if(navigator.vibrate) navigator.vibrate(700);
            }
        }

        function executeSuccessfulLogin() {
            document.getElementById('login-overlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('login-overlay').style.display = 'none';
            }, 300);
            initializeRealtimeSync();
        }

        // Unified 0.7-Second Visual Vibration Shaker Module
        function triggerErrorVibrationAnimation(targetElement) {
            targetElement.classList.remove('auth-error-animate');
            void targetElement.offsetWidth; // Force Dom Reflow
            targetElement.classList.add('auth-error-animate');
            setTimeout(() => {
                targetElement.classList.remove('auth-error-animate');
            }, 700);
        }

        // 3. Custom Secured Validation Modal Engine
        function requestSecureAccessPermission(actionTitle, onSuccessCallback) {
            const overlay = document.getElementById('secure-prompt-overlay');
            const box = document.getElementById('secure-prompt-box');
            const input = document.getElementById('secure-prompt-input');
            const confirmBtn = document.getElementById('secure-prompt-confirm-btn');

            document.getElementById('secure-prompt-title').innerText = actionTitle;
            input.value = "";
            overlay.classList.add('active');
            input.focus();

            // Handle Input Submission Rules
            const evaluateSubmission = () => {
                if (input.value === CRYPTO_KEY_HASH) {
                    overlay.classList.remove('active');
                    onSuccessCallback();
                } else {
                    triggerErrorVibrationAnimation(box);
                    if(navigator.vibrate) navigator.vibrate(700);
                }
            };

            confirmBtn.onclick = evaluateSubmission;
            input.onkeydown = (e) => { if (e.key === 'Enter') evaluateSubmission(); };
        }

        function closeSecurePrompt() {
            document.getElementById('secure-prompt-overlay').classList.remove('active');
        }

        // 7. True Real-Time Remote Synced Read Operations Engine
        function initializeRealtimeSync() {
            database.ref('accounting_tracker_data').on('value', (snapshot) => {
                globalDatabaseSnapshot = snapshot.val() || {};
                renderApplicationState();
            });
        }

        function persistStateToCloud() {
            database.ref('accounting_tracker_data').set(globalDatabaseSnapshot);
        }

        // Application Render Engine
        function renderApplicationState() {
            const wrapper = document.getElementById('dashboard-brokers-wrapper');
            wrapper.innerHTML = "";

            const brokers = globalDatabaseSnapshot.brokers || {};
            const clients = globalDatabaseSnapshot.clients || {};

            Object.keys(brokers).forEach(brokerId => {
                const broker = brokers[brokerId];
                const brokerCard = document.createElement('div');
                brokerCard.className = 'broker-container';
                brokerCard.id = `brk-block-${brokerId}`;

                brokerCard.innerHTML = `
                    <div class="broker-header">
                        <div class="broker-title">📁 Broker: ${broker.name}</div>
                        <div style="display:flex; gap:8px;">
                            <button class="btn-primary" onclick="addNewClientToBroker(${brokerId})">+ Add Client</button>
                            <button class="btn-danger" onclick="removeBrokerSecurely(${brokerId})">Remove Broker</button>
                        </div>
                    </div>
                    <div class="clients-grid" id="grid-broker-${brokerId}"></div>
                `;
                wrapper.appendChild(brokerCard);
            });

            // Populate Clients inside grids
            Object.keys(clients).forEach(clientId => {
                const client = clients[clientId];
                const grid = document.getElementById(`grid-broker-${client.brokerId}`);
                if (grid) {
                    const card = document.createElement('div');
                    card.className = 'client-card';
                    card.innerHTML = `
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <div class="client-name">👤 ${client.name || 'Unnamed Client'}</div>
                            <button class="btn-danger" style="padding:4px 8px; font-size:11px;" onclick="removeClientSecurely(${clientId})">Delete Profile</button>
                        </div>
                        
                        <div class="form-group">
                            <label>File Status</label>
                            <select onchange="handleSynchronizedInput(${clientId}, 'fileStatus', this.value)">
                                <option value="Pending" ${client.fileStatus === 'Pending' ? 'selected' : ''}>Pending</option>
                                <option value="In Progress" ${client.fileStatus === 'In Progress' ? 'selected' : ''}>In Progress</option>
                                <option value="Completed" ${client.fileStatus === 'Completed' ? 'selected' : ''}>Completed</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label>Bank Filing Date</label>
                            <div class="date-sync-container">
                                <input type="text" placeholder="DD/MM/YYYY" maxlength="10" value="${client.bankFilingDate || ''}" onchange="handleSynchronizedInput(${clientId}, 'bankFilingDate', this.value)" />
                                <div class="picker-wrapper" onmousedown="forceCalendarTrigger(event, 'pkr-${clientId}')">
                                    <input type="date" id="pkr-${clientId}" onchange="handleDateSelectionSync(${clientId}, 'bankFilingDate', this.value)" />
                                </div>
                            </div>
                        </div>

                        <div class="remarks-container">
                            <span class="remarks-label">Remarks:</span>
                            <textarea rows="3" placeholder="write notes here" onchange="handleSynchronizedInput(${clientId}, 'notes', this.value)">${client.notes || ''}</textarea>
                        </div>
                    `;
                    grid.appendChild(card);
                }
            });
        }

        // Mutation Actions & State Controls
        function createNewBroker() {
            const name = prompt("Enter New Broker Name:");
            if (!name) return;
            const id = Date.now();
            if (!globalDatabaseSnapshot.brokers) globalDatabaseSnapshot.brokers = {};
            globalDatabaseSnapshot.brokers[id] = { id: id, name: name };
            persistStateToCloud();
        }

        // 3. Password protected remove broker method wrapper
        function removeBrokerSecurely(brokerId) {
            requestSecureAccessPermission("Remove Broker Access", () => {
                if (globalDatabaseSnapshot.brokers && globalDatabaseSnapshot.brokers[brokerId]) {
                    delete globalDatabaseSnapshot.brokers[brokerId];
                    // Unlink associated clients
                    if (globalDatabaseSnapshot.clients) {
                        Object.keys(globalDatabaseSnapshot.clients).forEach(cid => {
                            if (globalDatabaseSnapshot.clients[cid].brokerId == brokerId) {
                                delete globalDatabaseSnapshot.clients[cid];
                            }
                        });
                    }
                    persistStateToCloud();
                }
            });
        }

        function addNewClientToBroker(brokerId) {
            const name = prompt("Enter Client Name:");
            if (!name) return;
            const id = Date.now();
            if (!globalDatabaseSnapshot.clients) globalDatabaseSnapshot.clients = {};
            globalDatabaseSnapshot.clients[id] = {
                id: id,
                brokerId: brokerId,
                name: name,
                fileStatus: "Pending",
                bankFilingDate: "",
                notes: ""
            };
            persistStateToCloud();
        }

        function addNewClientDirectly() {
            if (!globalDatabaseSnapshot.brokers || Object.keys(globalDatabaseSnapshot.brokers).length === 0) {
                alert("Please add at least one broker profile first.");
                return;
            }
            const brokerKeys = Object.keys(globalDatabaseSnapshot.brokers);
            addNewClientToBroker(brokerKeys[0]);
        }

        // 3. Password protected delete profile method wrapper
        function removeClientSecurely(clientId) {
            requestSecureAccessPermission("Delete Client Profile", () => {
                if (globalDatabaseSnapshot.clients && globalDatabaseSnapshot.clients[clientId]) {
                    delete globalDatabaseSnapshot.clients[clientId];
                    persistStateToCloud();
                }
            });
        }

        function handleSynchronizedInput(clientId, property, value) {
            if (globalDatabaseSnapshot.clients && globalDatabaseSnapshot.clients[clientId]) {
                globalDatabaseSnapshot.clients[clientId][property] = value;
                persistStateToCloud();
            }
        }

        function handleDateSelectionSync(clientId, property, isoValue) {
            if (!isoValue) return;
            const parts = isoValue.split('-'); // YYYY-MM-DD
            if(parts.length === 3) {
                const standardDate = `${parts[2]}/${parts[1]}/${parts[0]}`;
                handleSynchronizedInput(clientId, property, standardDate);
            }
        }

        function forceCalendarTrigger(event, targetElementId) {
            event.stopPropagation();
            const inputField = document.getElementById(targetElementId);
            if (inputField && typeof inputField.showPicker === 'function') {
                inputField.showPicker();
            }
        }

        function wipeAllSystemData() {
            requestSecureAccessPermission("Wipe Entire System Data", () => {
                if (confirm("Are you completely sure you want to delete all cloud tracker files?")) {
                    globalDatabaseSnapshot = { brokers: {}, clients: {} };
                    persistStateToCloud();
                }
            });
        }
    </script>
</body>
</html>
